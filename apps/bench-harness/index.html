<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <title>AxiCharts browser bench</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      #root { min-height: 100vh; padding: 16px; }
      .panel-grid {
        display: grid;
        grid-template-columns: repeat(3, 320px);
        gap: 12px;
      }
      .panel {
        width: 320px;
        height: 120px;
        background: #1e293b;
        border-radius: 8px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
