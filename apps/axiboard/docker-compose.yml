services:
  axiboard:
    build:
      context: ../..
      dockerfile: apps/axiboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      # OPENAI_API_KEY: sk-...
    volumes:
      - axiboard-data:/app/apps/axiboard/data

volumes:
  axiboard-data:
